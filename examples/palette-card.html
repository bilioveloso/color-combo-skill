<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>color-combo-skill — Palette Preview</title>
  <style>
    /* Swap the five variables to change the entire palette */
    :root {
      --color-bg:         #0B0B0F;
      --color-surface:    #1C1A17;
      --color-accent:     #D4AF37;
      --color-supporting: #B87333;
      --color-text:       #E9E1D0;
      --color-text-muted: #9A9082;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--color-bg);
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 32px;
    }

    .meta {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-text-muted);
    }

    .card {
      background: var(--color-surface);
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 14px;
      padding: 36px;
      max-width: 380px;
      width: 100%;
    }

    .card-tag {
      color: var(--color-accent);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .card h2 {
      color: var(--color-text);
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .card p {
      color: var(--color-text-muted);
      font-size: 14px;
      line-height: 1.65;
      margin-bottom: 28px;
    }

    .card-actions { display: flex; gap: 12px; }

    .btn-primary {
      background: var(--color-accent);
      color: var(--color-bg);
      border: none;
      padding: 11px 22px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-secondary {
      background: transparent;
      color: var(--color-text-muted);
      border: 1px solid rgba(154, 144, 130, 0.3);
      padding: 11px 22px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    .swatches {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .swatch {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .swatch-info {
      font-size: 11px;
      color: var(--color-text-muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <span class="meta">color-combo-skill · Golden Obsession · Luxury</span>

  <div class="card">
    <div class="card-tag">Exclusive Collection</div>
    <h2>The art of restraint,<br>the power of gold.</h2>
    <p>Five CSS custom properties. Swap them all to switch palettes. Accent (#D4AF37) on surface: <strong style="color:var(--color-accent)">9.8:1 ✓ AAA</strong></p>
    <div class="card-actions">
      <button class="btn-primary">Explore</button>
      <button class="btn-secondary">Learn more</button>
    </div>
  </div>

  <div class="swatches">
    <div class="swatch" style="background:#0B0B0F"></div>
    <div class="swatch" style="background:#1C1A17"></div>
    <div class="swatch" style="background:#D4AF37"></div>
    <div class="swatch" style="background:#B87333"></div>
    <div class="swatch" style="background:#E9E1D0"></div>
    <div class="swatch-info">
      Golden Obsession — Luxury<br>
      Accent 9.8:1 ✓ AAA · Supporting 4.6:1 ✓ AA
    </div>
  </div>
</body>
</html>
